workerPoolSpecs:
  - machineSpec:
      machineType: n1-highmem-16
    replicaCount: 1
    containerSpec:
      imageUri: us-docker.pkg.dev/vertex-ai/training/tf-cpu.2-17.py310:latest
      command:
        - bash
        - -c
        - |
          pip install pandas pyarrow gcsfs
          python3 -c "import pandas as pd; df = pd.read_parquet('gs://omega-pure-data/base_matrix_shards/20250102_fbd5c8b.parquet'); print('Columns:', df.columns.tolist()); print('Index names:', df.index.names); print('First 5 index values:', df.index[:5].tolist()); print('Unique index values count:', df.index.nunique())"
