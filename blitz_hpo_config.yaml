studySpec:
  metrics:
  - metricId: val_fvu
    goal: MINIMIZE
  parameters:
  - parameterId: stride
    integerValueSpec:
      minValue: 50
      maxValue: 2000
    scaleType: UNIT_LINEAR_SCALE
  - parameterId: seq_len
    discreteValueSpec:
      values:
      - 32
      - 64
      - 128
  algorithm: ALGORITHM_UNSPECIFIED
  measurementSelectionType: BEST_MEASUREMENT
trialJobSpec:
  workerPoolSpecs:
  - machineSpec:
      machineType: g2-standard-4 # 🔥 架构师修正：从 standard-32 降至 standard-4，极大降低 CPU 配合压力
      acceleratorType: NVIDIA_L4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: us-docker.pkg.dev/vertex-ai/training/pytorch-gpu.2-1.py310:latest
      command:
      - bash
      - -c
      args:
      - >
        gcloud storage cp gs://omega-pure-data/scripts/vertex_mae_blitz.py . && 
        pip install gcsfs pandas pyarrow numpy cloudml-hypertune && 
        python3 vertex_mae_blitz.py --gcs_input=gs://omega-pure-data/base_matrix_shards --logical_batch_size=4096 --micro_batch_size=512 --max_steps=3000 --report_freq=500 "$@"
      - _
  scheduling:
    strategy: SPOT # 🔥 锁定抢占式
    timeout: 86400s
    restartJobOnWorkerRestart: true
  baseOutputDirectory:
    outputUriPrefix: gs://omega-pure-data/omega_models/hpo_blitz
